# Multi-Architecture Build and Test Workflow for cups-filters
name: Build and Test (Multi-Architecture)

on:
  push:
    branches: [master, 2.0.x]
  pull_request:
    branches: [master, 2.0.x]
  workflow_dispatch:

jobs:
  build-matrix:
    strategy:
      fail-fast: false
      matrix:
        include:
          # 1. Native x86_64
          - arch: x86_64
            name: x86_64
            runs-on: ubuntu-latest
            use-qemu: false

          # 2. Native ARM64
          - arch: arm64
            name: arm64
            runs-on: ubuntu-24.04-arm
            use-qemu: false

          # 3. Emulated 32-bit ARM (Internal ID armv7 = armhf)
          - arch: armv7
            name: armhf
            runs-on: ubuntu-latest
            use-qemu: true
            distro: ubuntu22.04

          # 4. Emulated RISC-V
          - arch: riscv64
            name: riscv64
            runs-on: ubuntu-latest
            use-qemu: true
            distro: ubuntu22.04

    runs-on: ${{ matrix.runs-on }}
    name: Build & Test (${{ matrix.name }})

    steps:
      - uses: actions/checkout@v4

      # ==========================================
      # 1. NATIVE EXECUTION (x86_64 and arm64)
      # ==========================================
      - name: Install Dependencies (Native)
        if: matrix.use-qemu == false
        run: |
          sudo apt-get update --fix-missing -y
          # Remove system versions to ensure we test against our local build stack
          sudo apt-get remove -y libcupsfilters-dev libppd-dev || true
          sudo apt-get install -y \
            libcups2-dev ghostscript liblcms2-dev libpoppler-cpp-dev libpng-dev \
            libjpeg-dev libtiff-dev zlib1g-dev libfontconfig1-dev libdbus-1-dev \
            libexif-dev libavahi-common-dev libavahi-client-dev poppler-utils \
            sharutils pkg-config autoconf automake libtool gettext autopoint mupdf-tools

      - name: Build Stack and cups-filters (Native)
        if: matrix.use-qemu == false
        run: |
          # Build pdfio
          cd /tmp && wget -q https://github.com/michaelrsweet/pdfio/releases/download/v1.6.2/pdfio-1.6.2.tar.gz
          tar -xzf pdfio-1.6.2.tar.gz && cd pdfio-1.6.2 && ./configure --prefix=/usr && make && sudo make install
          
          # Build libcupsfilters (Version 2.x)
          cd /tmp && git clone --depth 1 https://github.com/OpenPrinting/libcupsfilters.git
          cd libcupsfilters && ./autogen.sh && ./configure --prefix=/usr && make && sudo make install
          
          # Build libppd
          cd /tmp && git clone --depth 1 https://github.com/OpenPrinting/libppd.git
          cd libppd && ./autogen.sh && ./configure --prefix=/usr && make && sudo make install
          
          # Build and Test cups-filters
          cd "$GITHUB_WORKSPACE"
          ./autogen.sh && ./configure --prefix=/usr
          make -j$(nproc)
          make check V=1 VERBOSE=1 || (test -f test-suite.log && cat test-suite.log; exit 1)

      - name: Upload artifacts (Native)
        if: matrix.use-qemu == false && always()
        uses: actions/upload-artifact@v4
        with:
          name: cups-filters-artifacts-${{ matrix.name }}
          path: |
            test-suite.log
            **/*.log
            **/test-suite.log

      # ==========================================
      # 2. EMULATED EXECUTION (armhf and riscv64)
      # ==========================================
      - name: Build and Test (Emulated)
        if: matrix.use-qemu == true
        uses: uraimo/run-on-arch-action@v3
        with:
          arch: ${{ matrix.arch }}
          distro: ${{ matrix.distro }}
          install: |
            apt-get update -y
            apt-get install -y git wget build-essential libcups2-dev ghostscript liblcms2-dev \
              libpoppler-cpp-dev libpng-dev libjpeg-dev libtiff-dev zlib1g-dev \
              libfontconfig1-dev libdbus-1-dev libexif-dev libavahi-common-dev \
              libavahi-client-dev poppler-utils sharutils pkg-config autoconf \
              automake libtool gettext autopoint mupdf-tools
          run: |
            # Build pdfio
            cd /tmp && wget -q https://github.com/michaelrsweet/pdfio/releases/download/v1.6.2/pdfio-1.6.2.tar.gz
            tar -xzf pdfio-1.6.2.tar.gz && cd pdfio-1.6.2 && ./configure --prefix=/usr && make && make install
            
            # Build libcupsfilters
            cd /tmp && git clone --depth 1 https://github.com/OpenPrinting/libcupsfilters.git
            cd libcupsfilters && ./autogen.sh && ./configure --prefix=/usr && make && make install
            
            # Build libppd
            cd /tmp && git clone --depth 1 https://github.com/OpenPrinting/libppd.git
            cd libppd && ./autogen.sh && ./configure --prefix=/usr && make && make install
            
            # Build and Test cups-filters
            cd $(pwd)
            ./autogen.sh && ./configure --prefix=/usr
            make -j$(nproc)
            make check V=1 VERBOSE=1 || (test -f test-suite.log && cat test-suite.log; exit 1)

      - name: Upload artifacts (Emulated)
        if: matrix.use-qemu == true && always()
        uses: actions/upload-artifact@v4
        with:
          name: cups-filters-artifacts-${{ matrix.name }}
          path: |
            test-suite.log
            **/*.log
            **/test-suite.log
          continue-on-error: true