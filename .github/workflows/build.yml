name: Build and Test (Multi-Architecture)

on:
  push:
    branches:
      - master
      - 2.0.x
  pull_request:
    branches:
      - master
      - 2.0.x
  workflow_dispatch:

jobs:
  build-matrix:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runs-on: ubuntu-latest
            use-qemu: false

          - arch: arm64
            runs-on: ubuntu-24.04-arm
            use-qemu: false

          - arch: armhf
            runs-on: ubuntu-latest
            use-qemu: true

          - arch: riscv64
            runs-on: ubuntu-latest
            use-qemu: true

    runs-on: ${{ matrix.runs-on }}
    name: Build & Test (${{ matrix.arch }})

    steps:
      - name: Set up QEMU for ${{ matrix.arch }}
        if: matrix.use-qemu == true
        uses: docker/setup-qemu-action@v3

      - name: Checkout cups-filters sources
        uses: actions/checkout@v4

      - name: Show system info
        run: |
          echo "=== Architecture: $(uname -m) ==="
          cat /etc/os-release | grep PRETTY_NAME | awk -F '=' '{print $2}'
          echo "QEMU: ${{ matrix.use-qemu }}"

      - name: Update build environment
        run: sudo apt-get update --fix-missing -y

      - name: Install prerequisites
        run: |
          sudo apt-get install -y \
            libcups2-dev \
            libcupsfilters-dev \
            libppd-dev \
            ghostscript \
            liblcms2-dev \
            libpoppler-cpp-dev \
            libpng-dev \
            libjpeg-dev \
            libtiff5-dev \
            zlib1g-dev \
            libfontconfig1-dev \
            libdbus-1-dev \
            libexif-dev \
            libavahi-common-dev \
            libavahi-client-dev \
            poppler-utils \
            sharutils \
            pkg-config \
            autoconf \
            automake \
            libtool \
            gettext \
            autopoint \
            mupdf-tools

      - name: Generate configure script
        run: ./autogen.sh

      - name: Configure cups-filters
        env:
          CC: /usr/bin/gcc
        run: ./configure

      - name: Build cups-filters
        run: make

      - name: Run tests
        run: make check

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: cups-filters-test-artifacts-${{ matrix.arch }}
          path: |
            test
            **/test-*.log
            **/*.trs